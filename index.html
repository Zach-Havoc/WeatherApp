<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <!-- Google Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

    <!-- Separated CSS Stylesheet -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="tablet-container">

        <!-- Header Section -->
        <header class="header-bar">
            <div class="logo-section">
                <h1>Weather</h1>
                <div class="unit-toggle">
                    <span class="active">°C</span> / <span>°F</span>
                </div>
            </div>
            <div class="search-wrapper">
                <form id="search-form" class="search-form">
                    <span class="material-symbols-outlined search-icon">search</span>
                    <input id="city-input" type="text" placeholder="Search city..." autocomplete="off" />
                    <button type="submit">Search</button>
                </form>
                <ul id="search-suggestions" class="search-suggestions" role="listbox" aria-label="City suggestions">
                </ul>
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn-add-dashboard">
                    <span class="material-symbols-outlined" style="font-size: 18px;">add</span> Add to Dashboard
                </button>
            </div>
        </header>

        <!-- Main Workspace Panel -->
        <main class="dashboard-grid">

            <!-- Left Panel -->
            <div class="left-column">

                <!-- Current Temperature Display Block -->
                <section class="card current-weather-card">
                    <div class="meta-info">
                        <div class="date-time" id="current-date">Loading weather…</div>
                        <div class="city-name" id="city-name">Manila</div>
                        <div class="condition-text" id="condition-text">Mostly Sunny</div>

                        <!-- Dynamic "What to Wear" / Lifestyle Badge -->
                        <div id="lifestyle-badge" class="lifestyle-badge">Calculating outfit...</div>

                        <div class="temp-display">
                            <div class="main-degrees" id="main-degrees">68°</div>
                            <div class="high-low" id="high-low">H 76° &nbsp;L 52°</div>
                        </div>
                    </div>
                    <span class="material-symbols-outlined weather-icon-large" id="weather-icon-large">wb_sunny</span>
                </section>

                <!-- Saved Cities/Locations Tracker -->
                <section class="card location-list-card">
                </section>
            </div>

            <!-- Right Panel -->
            <div class="right-column">

                <!-- Advanced Metrics Strip & Hourly Scroll Dashboard -->
                <section class="card data-metrics-card">
                    <div class="metrics-strip">
                        <div class="metric-item"><span class="label">Feels Like</span><span class="value"
                                id="feels-like">64°</span></div>
                        <div class="metric-item"><span class="label">Wind</span><span class="value"
                                id="wind">11MPH</span></div>
                        <div class="metric-item"><span class="label">Visibility</span><span class="value"
                                id="visibility">7ML</span></div>
                        <div class="metric-item"><span class="label">Humidity</span><span class="value"
                                id="humidity">72%</span></div>
                        <div class="metric-item"><span class="label">Pressure</span><span class="value"
                                id="pressure">30.9IN</span></div>
                        <div class="metric-item"><span class="label">Air Quality</span><span class="value"
                                id="air-quality">--</span></div>
                    </div>
                    <div id="status-message" class="status-message info">Loading weather…</div>

                    <!-- Hourly Scroll Integration -->
                    <div class="hourly-section">
                        <div class="hourly-scroll" id="hourly-forecast"></div>
                    </div>
                </section>

                <!-- 7-Day Extended Forecast View -->
                <section class="card extended-forecast-card">
                    <div class="chart-overlay-line"></div>
                    <div class="days-row" id="forecast-days"></div>
                </section>
            </div>
        </main>

    </div>

    <script src="script.js"></script>
</body>

</html>
